<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Travel Marketing Hub</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>
<body class="login-page">

  <header class="site-header">
    <div class="header-inner">
      <img src="{{ url_for('static', filename='img/logo.png') }}" alt="Travel Marketing Hub" class="header-logo" onerror="this.style.display='none';document.getElementById('header-wordmark').style.display='block';" />
      <span id="header-wordmark" class="header-wordmark" style="display:none;">Travel Marketing Hub</span>
    </div>
  </header>

  <main class="login-main">
    <div class="login-card">
      <div class="login-card-top">
        <h1 class="login-title">Content Hub</h1>
        <p class="login-subtitle">Sign in to access your destination packs</p>
      </div>

      {% if error %}
      <div class="alert alert-error">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16"><path d="M8 15A7 7 0 1 1 8 1a7 7 0 0 1 0 14zm0 1A8 8 0 1 0 8 0a8 8 0 0 0 0 16z"/><path d="M7.002 11a1 1 0 1 1 2 0 1 1 0 0 1-2 0zM7.1 4.995a.905.905 0 1 1 1.8 0l-.35 3.507a.552.552 0 0 1-1.1 0L7.1 4.995z"/></svg>
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="{{ url_for('login') }}" class="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email address</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Your password"
            autocomplete="current-password"
            required
          />
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign in</button>
      </form>

      <p class="login-help">
        Need help? <a href="mailto:info@thetravelmarketinghub.com">info@thetravelmarketinghub.com</a>
      </p>
    </div>
  </main>

</body>
</html>
